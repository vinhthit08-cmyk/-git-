name: Daily Art Education Brief

on:
  schedule:
    # 07:30 Asia/Shanghai = 23:30 UTC (previous day)
    - cron: "30 23 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: npm install -g @openai/codex@0.140.0

      - name: Run Codex login
        env:
          IAPIBOX_API_KEY: ${{ secrets.IAPIBOX_API_KEY }}
        run: printenv IAPIBOX_API_KEY | codex login --with-api-key

      - name: Generate report
        run: python scripts/run_daily_report.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/latest.md outputs/*.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update daily art education brief"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Post to issue for phone notification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_ISSUE_NUMBER: ${{ secrets.REPORT_ISSUE_NUMBER }}
        run: python scripts/post_latest_report.py
